# The main pipeline for SampleBundle

resources:
  pipelines:
    SampleBundle_etl:
      name: SampleBundle_etl
      catalog: ${var.catalog}
      schema: ${var.schema}
      serverless: true
      root_path: "../src/SampleBundle_etl"

      libraries:
        - glob:
            include: ../src/SampleBundle_etl/transformations/**

      environment:
        dependencies:
          # We include every dependency defined by pyproject.toml by defining an editable environment
          # that points to the folder where pyproject.toml is deployed.
          - --editable ${workspace.file_path}
